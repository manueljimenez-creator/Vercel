<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planeo — Pago cancelado</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 28px;
      padding: 44px 28px 36px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    }
    .icon-circle {
      width: 72px; height: 72px;
      border-radius: 36px;
      background: #e5e7eb;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .icon-circle svg { width: 34px; height: 34px; fill: #6b7280; }
    .title { font-size: 22px; font-weight: 800; color: #1a1a1a; margin-bottom: 8px; }
    .subtitle { color: #6b7280; font-size: 15px; line-height: 1.5; margin-bottom: 28px; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 16px; border-radius: 16px;
      font-size: 16px; font-weight: 700; text-decoration: none;
      background: linear-gradient(180deg, #fc4c00, #fbc502); color: white;
    }
    .footer { margin-top: 22px; color: #9ca3af; font-size: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-circle">
      <svg viewBox="0 0 24 24"><path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </div>
    <h1 class="title">Pago cancelado</h1>
    <p class="subtitle">No se ha realizado ningún cargo. Vuelve a Planeo si quieres intentarlo de nuevo.</p>
    <a id="btn-open" class="btn" href="planeo://payment-cancel">Volver a Planeo</a>
  </div>
  <p class="footer">planeoeo.com</p>
  <script>
    setTimeout(function () { window.location.href = "planeo://payment-cancel"; }, 400);
  </script>
</body>
</html>
